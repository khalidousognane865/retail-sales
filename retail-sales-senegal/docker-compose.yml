version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: retail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retail_senegal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaza123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d   # exécute automatiquement 01_create_tables.sql au 1er démarrage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retail_senegal"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: retail_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: khalidousognane@gmail.com
      PGADMIN_DEFAULT_PASSWORD: kaza123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
